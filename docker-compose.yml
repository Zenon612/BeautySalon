services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: beautysalon_db
    environment:
      POSTGRES_DB: beauty_salon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beautysalon_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/beauty_salon
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-min-32-characters-long-change-this}
      DEBUG: ${DEBUG:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/home/appuser/app
      - ./uploads:/home/appuser/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


  nginx:
    image: nginx:alpine
    container_name: beautysalon_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped


volumes:
  postgres_data: